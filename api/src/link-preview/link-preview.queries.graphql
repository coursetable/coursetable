query courseMetadata($listingId: Int!) {
  listings_by_pk(listing_id: $listingId) {
    course_code
    section
    course {
      title
      description
    }
  }
}

query professorMetadata($professorId: Int!) {
  professors(where: { professor_id: { _eq: $professorId } }, limit: 1) {
    professor_id
    name
    email
    courses_taught
  }
}
